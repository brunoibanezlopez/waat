workflow: SERVICE_REQUEST_6_NODES
initial_state: CLASSIFY_REQUEST
terminal_states:
- REQUEST_COMPLETE
- REQUEST_ESCALATED
states:
  CLASSIFY_REQUEST:
    action: call_classifier_agent
    action_params:
      customer_id: ''
      request_text: ''
    transitions:
    - to: HANDLE_ACCOUNT_QUERY
      condition: action_result.status == "success" and action_result.data.classification
        == "account_query"
    - to: HANDLE_SERVICE_CHANGE
      condition: action_result.status == "success" and action_result.data.classification
        == "service_change"
    - to: HANDLE_COMPLAINT
      condition: action_result.status == "success" and action_result.data.classification
        == "complaint"
    - to: REQUEST_ESCALATED
      condition: action_result.status != "success" or action_result.data.classification
        == "unclassifiable_or_sensitive"
  HANDLE_ACCOUNT_QUERY:
    action: call_account_agent
    action_params:
      customer_id: ''
      query_type: ''
    transitions:
    - to: REQUEST_COMPLETE
      condition: action_result.status == "success" and action_result.data.customer_satisfied
        == true and action_result.data.data_available == true and action_result.data.query_type
        not in ["payment_status", "balance_dispute"]
    - to: HANDLE_COMPLAINT
      condition: action_result.status == "success" and action_result.data.query_type in
        ["payment_status", "balance_dispute"] and action_result.data.data_available
        == true
    - to: REQUEST_ESCALATED
      condition: action_result.status != "success" or action_result.data.data_available
        == false
  HANDLE_SERVICE_CHANGE:
    action: call_service_agent
    action_params:
      customer_id: ''
      change_type: ''
    transitions:
    - to: REQUEST_COMPLETE
      condition: action_result.status == "success" and action_result.data.completed
        == true and action_result.data.manual_approval_required == false
    - to: REQUEST_ESCALATED
      condition: action_result.status != "success" or action_result.data.completed == false
        or action_result.data.manual_approval_required == true
  HANDLE_COMPLAINT:
    action: call_complaint_agent
    action_params:
      customer_id: ''
      complaint_text: ''
    transitions:
    - to: REQUEST_COMPLETE
      condition: action_result.status == "success" and action_result.data.resolution_offered
        == true and action_result.data.customer_accepted == true
    - to: REQUEST_ESCALATED
      condition: action_result.status != "success" or action_result.data.resolution_offered
        == false or action_result.data.customer_accepted == false
