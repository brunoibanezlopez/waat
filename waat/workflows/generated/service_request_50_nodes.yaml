workflow: SERVICE_REQUEST_50_NODES
initial_state: CLASSIFY_REQUEST
terminal_states:
- REQUEST_COMPLETE
- REQUEST_ESCALATED
states:
  CLASSIFY_REQUEST:
    action: call_intake_classifier_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: VERIFY_CUSTOMER_IDENTITY
      condition: request maps to account, billing, service, complaint, or field-support
        handling
    - to: REVIEW_SECURITY_OR_PRIVACY_RISK
      condition: request contains sensitive data, account takeover risk, or policy-bypass
        language
    - to: REQUEST_ESCALATED
      condition: request cannot be classified with sufficient confidence
  VERIFY_CUSTOMER_IDENTITY:
    action: call_identity_verification_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: RETRIEVE_CUSTOMER_PROFILE
      condition: customer identity is verified or low-risk assisted service is allowed
    - to: REVIEW_SECURITY_OR_PRIVACY_RISK
      condition: identity verification fails or request involves another customer's
        data
  RETRIEVE_CUSTOMER_PROFILE:
    action: call_customer_profile_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CHECK_ACCOUNT_STATUS
      condition: request is about account information, payment status, ownership,
        or billing
    - to: CHECK_CONTRACT_TERMS
      condition: request is a service modification, upgrade, relocation, or contract
        exception
    - to: CAPTURE_COMPLAINT_DETAILS
      condition: request is primarily a complaint or dissatisfaction event
    - to: REQUEST_ESCALATED
      condition: profile is unavailable or does not match the requesting party
  REVIEW_SECURITY_OR_PRIVACY_RISK:
    action: call_compliance_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_ESCALATED
      condition: privacy, security, or policy risk requires manual handling
    - to: VERIFY_CUSTOMER_IDENTITY
      condition: risk is cleared and the request may continue through normal identity
        checks
  CHECK_ACCOUNT_STATUS:
    action: call_account_status_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: RETRIEVE_BILLING_PROFILE
      condition: billing profile should be retrieved before answering account or payment
        questions
    - to: HANDLE_ACCOUNT_QUERY
      condition: account is active and the requested data is available
    - to: ASSESS_BILLING_DISPUTE
      condition: account request contains payment or balance-dispute indicators
    - to: CREATE_SUPPORT_TICKET
      condition: account data is unavailable, inconsistent, or requires back-office
        recovery
  HANDLE_ACCOUNT_QUERY:
    action: call_account_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: VALIDATE_ACCOUNT_CONTACTS
      condition: account response requires contact-data validation
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: query answered and customer is satisfied
    - to: ASSESS_BILLING_DISPUTE
      condition: answer reveals a payment, charge, or statement dispute
    - to: CREATE_SUPPORT_TICKET
      condition: account data cannot be retrieved automatically
  ASSESS_BILLING_DISPUTE:
    action: call_billing_dispute_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REVIEW_BILLING_ADJUSTMENT
      condition: billing dispute requires adjustment or goodwill review
    - to: HANDLE_COMPLAINT
      condition: billing dispute can be addressed through complaint-resolution handling
    - to: REQUEST_MANUAL_APPROVAL
      condition: refund, credit, or adjustment exceeds automated authority
    - to: CREATE_SUPPORT_TICKET
      condition: billing records are incomplete or require back-office investigation
  CHECK_CONTRACT_TERMS:
    action: call_contract_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: DESIGN_CUSTOM_NETWORK_OPTION
      condition: custom network design requests require solution design
    - to: CHECK_SITE_SERVICEABILITY
      condition: relocation requests require site serviceability checks
    - to: VERIFY_SERVICE_INVENTORY
      condition: service inventory must be verified before change eligibility
    - to: HANDLE_SERVICE_CHANGE
      condition: requested change is permitted under the active contract
    - to: SCHEDULE_TECHNICIAN
      condition: relocation or installation request requires field scheduling
    - to: REQUEST_MANUAL_APPROVAL
      condition: change exceeds contract limits or requires commercial approval
    - to: CREATE_SUPPORT_TICKET
      condition: contract data is missing or inconsistent
  HANDLE_SERVICE_CHANGE:
    action: call_service_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CONFIGURE_SERVICE_ORDER
      condition: eligible service change requires an order configuration step
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: service change completed successfully
    - to: REQUEST_MANUAL_APPROVAL
      condition: change requires manual approval or custom design
    - to: CREATE_SUPPORT_TICKET
      condition: service platform cannot complete the change automatically
  REQUEST_MANUAL_APPROVAL:
    action: call_approval_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_ESCALATED
      condition: manual approval is required before the customer request can proceed
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: approval is granted and customer-facing confirmation can be sent
  CAPTURE_COMPLAINT_DETAILS:
    action: call_complaint_intake_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REVIEW_REGULATORY_RISK
      condition: regulatory or unresolved complaints require risk review
    - to: CHECK_SERVICE_HEALTH
      condition: service-related complaint requires health diagnostics
    - to: CHECK_SERVICE_OUTAGE
      condition: complaint concerns service quality, outage, speed, installation,
        or technician attendance
    - to: HANDLE_COMPLAINT
      condition: complaint can proceed directly to resolution handling
    - to: REQUEST_MANUAL_APPROVAL
      condition: complaint indicates regulatory, executive, or unresolved escalation
        risk
  HANDLE_COMPLAINT:
    action: call_complaint_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: resolution offered and accepted
    - to: REQUEST_MANUAL_APPROVAL
      condition: customer remains dissatisfied or issue requires specialist escalation
    - to: CREATE_SUPPORT_TICKET
      condition: resolution requires follow-up work by another team
  CHECK_SERVICE_OUTAGE:
    action: call_outage_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: RUN_LINE_TEST
      condition: service outage or speed complaint requires a line test
    - to: SCHEDULE_TECHNICIAN
      condition: field visit or installation remediation is required
    - to: HANDLE_COMPLAINT
      condition: service issue can be resolved or compensated without field dispatch
    - to: CREATE_SUPPORT_TICKET
      condition: network investigation is required before resolution
  SCHEDULE_TECHNICIAN:
    action: call_field_service_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CREATE_SUPPORT_TICKET
      condition: technician appointment is scheduled and must be tracked
    - to: REQUEST_MANUAL_APPROVAL
      condition: field dispatch requires approval or specialist coordination
  CREATE_SUPPORT_TICKET:
    action: call_ticketing_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_ESCALATED
      condition: ticket requires manual queue ownership or specialist follow-up
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: ticket created and customer can be notified of next steps
  SEND_CUSTOMER_CONFIRMATION:
    action: call_notification_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: PREPARE_CUSTOMER_SUMMARY
      condition: customer communication should include a structured case summary
    - to: LOG_INTERACTION
      condition: customer confirmation has been sent successfully
    - to: CREATE_SUPPORT_TICKET
      condition: confirmation failed and follow-up tracking is required
  LOG_INTERACTION:
    action: call_audit_log_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: RECONCILE_CASE_NOTES
      condition: interaction logging requires case-note reconciliation
    - to: CLOSE_REQUEST
      condition: interaction notes, decision rationale, and outcome are recorded
    - to: CREATE_SUPPORT_TICKET
      condition: audit log cannot be completed automatically
  CLOSE_REQUEST:
    action: call_closure_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_COMPLETE
      condition: all required customer-facing and audit steps are complete
    - to: REQUEST_ESCALATED
      condition: closure check identifies unresolved operational risk
  VALIDATE_ACCOUNT_CONTACTS:
    action: call_contact_validation_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: validated contact records allow customer confirmation
    - to: CREATE_SUPPORT_TICKET
      condition: contact records require correction
  RETRIEVE_BILLING_PROFILE:
    action: call_billing_profile_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: RECOVER_MISSING_ACCOUNT_DATA
      condition: missing account data requires recovery before a response can be given
    - to: HANDLE_ACCOUNT_QUERY
      condition: billing profile supports a standard account answer
    - to: VALIDATE_PAYMENT_HISTORY
      condition: payment history or charges must be checked
  VALIDATE_PAYMENT_HISTORY:
    action: call_payment_history_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: ASSESS_BILLING_DISPUTE
      condition: payment history confirms a dispute or mismatch
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: payment history resolves the question
  REVIEW_BILLING_ADJUSTMENT:
    action: call_credit_assessment_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: HANDLE_COMPLAINT
      condition: approved adjustment can be offered as complaint resolution
    - to: REQUEST_MANUAL_APPROVAL
      condition: credit or refund exceeds automated threshold
  VERIFY_ACCOUNT_OWNERSHIP:
    action: call_ownership_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: HANDLE_ACCOUNT_QUERY
      condition: ownership is verified
    - to: CREATE_SUPPORT_TICKET
      condition: ownership records require back-office review
  RECOVER_MISSING_ACCOUNT_DATA:
    action: call_data_recovery_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CREATE_SUPPORT_TICKET
      condition: data recovery requires manual queue handling
    - to: HANDLE_ACCOUNT_QUERY
      condition: missing data is recovered
  VERIFY_SERVICE_INVENTORY:
    action: call_inventory_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: ASSESS_CHANGE_ELIGIBILITY
      condition: service inventory supports the requested change
    - to: CREATE_SUPPORT_TICKET
      condition: inventory is missing or inconsistent
  ASSESS_CHANGE_ELIGIBILITY:
    action: call_change_eligibility_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: HANDLE_SERVICE_CHANGE
      condition: change is eligible for automated fulfilment
    - to: REQUEST_MANUAL_APPROVAL
      condition: change requires commercial or technical approval
  CHECK_SITE_SERVICEABILITY:
    action: call_serviceability_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SCHEDULE_TECHNICIAN
      condition: site visit or installation appointment is required
    - to: HANDLE_SERVICE_CHANGE
      condition: site is serviceable without field work
  DESIGN_CUSTOM_NETWORK_OPTION:
    action: call_solution_design_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_MANUAL_APPROVAL
      condition: custom design must be reviewed by engineering
    - to: CREATE_SUPPORT_TICKET
      condition: design work item is created for solutioning
  CONFIGURE_SERVICE_ORDER:
    action: call_order_config_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SUBMIT_SERVICE_ORDER
      condition: order configuration is valid
    - to: CREATE_SUPPORT_TICKET
      condition: order configuration failed validation
  SUBMIT_SERVICE_ORDER:
    action: call_order_submission_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: service order is submitted
    - to: CREATE_SUPPORT_TICKET
      condition: order submission failed and requires follow-up
  CHECK_SERVICE_HEALTH:
    action: call_service_health_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CHECK_SERVICE_OUTAGE
      condition: service health review requires outage correlation
    - to: RUN_LINE_TEST
      condition: service-health signals require technical diagnostics
    - to: HANDLE_COMPLAINT
      condition: health check supports complaint resolution
  RUN_LINE_TEST:
    action: call_line_test_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SCHEDULE_TECHNICIAN
      condition: line test indicates premises or field fault
    - to: HANDLE_COMPLAINT
      condition: line test does not require dispatch
  CHECK_APPOINTMENT_HISTORY:
    action: call_appointment_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SCHEDULE_TECHNICIAN
      condition: new or replacement appointment is required
    - to: HANDLE_COMPLAINT
      condition: appointment issue can be compensated without dispatch
  ASSESS_SERVICE_CREDIT:
    action: call_service_credit_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: HANDLE_COMPLAINT
      condition: service credit can resolve the complaint
    - to: REQUEST_MANUAL_APPROVAL
      condition: credit requires approval
  REVIEW_REGULATORY_RISK:
    action: call_regulatory_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_MANUAL_APPROVAL
      condition: formal complaint or regulatory language requires escalation
    - to: HANDLE_COMPLAINT
      condition: risk is low enough for standard complaint handling
  CHECK_RETENTION_ELIGIBILITY:
    action: call_retention_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: ASSESS_RETENTION_OFFER
      condition: customer is eligible for save or goodwill offer
    - to: REQUEST_MANUAL_APPROVAL
      condition: retention exception requires approval
  ASSESS_RETENTION_OFFER:
    action: call_offer_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: offer is accepted and can be confirmed
    - to: HANDLE_COMPLAINT
      condition: offer is rejected and complaint handling continues
  OPEN_CASE_RECORD:
    action: call_case_record_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CREATE_SUPPORT_TICKET
      condition: case record requires queue ownership
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: case record is complete and customer can be notified
  ASSIGN_SPECIALIST_QUEUE:
    action: call_queue_assignment_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_ESCALATED
      condition: specialist queue accepts ownership
    - to: CREATE_SUPPORT_TICKET
      condition: queue assignment requires ticket tracking
  NOTIFY_BACK_OFFICE:
    action: call_back_office_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CREATE_SUPPORT_TICKET
      condition: back-office team must act asynchronously
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: back-office notification is recorded
  CHECK_KNOWLEDGE_BASE:
    action: call_knowledge_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: HANDLE_ACCOUNT_QUERY
      condition: knowledge article answers the request
    - to: CREATE_SUPPORT_TICKET
      condition: knowledge article does not cover the case
  VALIDATE_CUSTOMER_CONSENT:
    action: call_consent_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: customer consent is present for the action
    - to: REVIEW_SECURITY_OR_PRIVACY_RISK
      condition: consent is missing or invalid
  REVIEW_VULNERABLE_CUSTOMER_FLAG:
    action: call_vulnerability_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_MANUAL_APPROVAL
      condition: vulnerability marker requires assisted handling
    - to: VERIFY_CUSTOMER_IDENTITY
      condition: normal process may continue
  CHECK_FRAUD_SIGNALS:
    action: call_fraud_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REVIEW_SECURITY_OR_PRIVACY_RISK
      condition: fraud indicators are present
    - to: VERIFY_CUSTOMER_IDENTITY
      condition: fraud checks are clear
  PREPARE_CUSTOMER_SUMMARY:
    action: call_summary_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: LOG_INTERACTION
      condition: summary is prepared and should be logged
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: summary requires customer-facing confirmation
  RECONCILE_CASE_NOTES:
    action: call_case_notes_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CLOSE_REQUEST
      condition: case notes are reconciled and the request can be closed
    - to: CREATE_SUPPORT_TICKET
      condition: case notes require manual correction
  QUALITY_REVIEW_SAMPLE:
    action: call_quality_review_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CLOSE_REQUEST
      condition: case passes quality review
    - to: REQUEST_MANUAL_APPROVAL
      condition: quality review requires supervisor action
  SURVEY_CUSTOMER_SATISFACTION:
    action: call_survey_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CLOSE_REQUEST
      condition: survey invitation is sent
    - to: LOG_INTERACTION
      condition: survey cannot be sent but outcome is logged
