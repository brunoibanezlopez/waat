workflow: SERVICE_REQUEST_20_NODES
initial_state: CLASSIFY_REQUEST
terminal_states:
- REQUEST_COMPLETE
- REQUEST_ESCALATED
states:
  CLASSIFY_REQUEST:
    action: call_intake_classifier_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: VERIFY_CUSTOMER_IDENTITY
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "VERIFY_CUSTOMER_IDENTITY"
    - to: REVIEW_SECURITY_OR_PRIVACY_RISK
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "REVIEW_SECURITY_OR_PRIVACY_RISK"
    - to: REQUEST_ESCALATED
      condition: action_result.status == "requires_manual_review" or action_result.recommended_next_state
        == "REQUEST_ESCALATED"
  VERIFY_CUSTOMER_IDENTITY:
    action: call_identity_verification_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: RETRIEVE_CUSTOMER_PROFILE
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "RETRIEVE_CUSTOMER_PROFILE"
    - to: REVIEW_SECURITY_OR_PRIVACY_RISK
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "REVIEW_SECURITY_OR_PRIVACY_RISK"
  RETRIEVE_CUSTOMER_PROFILE:
    action: call_customer_profile_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CHECK_ACCOUNT_STATUS
      condition: action_result.data.case_category == "account" and action_result.recommended_next_state
        == "CHECK_ACCOUNT_STATUS"
    - to: CHECK_CONTRACT_TERMS
      condition: action_result.data.case_category == "service" and action_result.recommended_next_state
        == "CHECK_CONTRACT_TERMS"
    - to: CAPTURE_COMPLAINT_DETAILS
      condition: action_result.data.case_category == "complaint" and action_result.recommended_next_state
        == "CAPTURE_COMPLAINT_DETAILS"
    - to: REQUEST_ESCALATED
      condition: action_result.status == "requires_manual_review" or action_result.recommended_next_state
        == "REQUEST_ESCALATED"
  REVIEW_SECURITY_OR_PRIVACY_RISK:
    action: call_compliance_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_ESCALATED
      condition: action_result.status == "requires_manual_review" or action_result.recommended_next_state
        == "REQUEST_ESCALATED"
    - to: VERIFY_CUSTOMER_IDENTITY
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "VERIFY_CUSTOMER_IDENTITY"
  CHECK_ACCOUNT_STATUS:
    action: call_account_status_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: HANDLE_ACCOUNT_QUERY
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "HANDLE_ACCOUNT_QUERY"
    - to: ASSESS_BILLING_DISPUTE
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "ASSESS_BILLING_DISPUTE"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  HANDLE_ACCOUNT_QUERY:
    action: call_account_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "SEND_CUSTOMER_CONFIRMATION"
    - to: ASSESS_BILLING_DISPUTE
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "ASSESS_BILLING_DISPUTE"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  ASSESS_BILLING_DISPUTE:
    action: call_billing_dispute_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: HANDLE_COMPLAINT
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "HANDLE_COMPLAINT"
    - to: REQUEST_MANUAL_APPROVAL
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "REQUEST_MANUAL_APPROVAL"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  CHECK_CONTRACT_TERMS:
    action: call_contract_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: HANDLE_SERVICE_CHANGE
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "HANDLE_SERVICE_CHANGE"
    - to: SCHEDULE_TECHNICIAN
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "SCHEDULE_TECHNICIAN"
    - to: REQUEST_MANUAL_APPROVAL
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "REQUEST_MANUAL_APPROVAL"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  HANDLE_SERVICE_CHANGE:
    action: call_service_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "SEND_CUSTOMER_CONFIRMATION"
    - to: REQUEST_MANUAL_APPROVAL
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "REQUEST_MANUAL_APPROVAL"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  REQUEST_MANUAL_APPROVAL:
    action: call_approval_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_ESCALATED
      condition: action_result.status == "requires_manual_review" or action_result.recommended_next_state
        == "REQUEST_ESCALATED"
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "SEND_CUSTOMER_CONFIRMATION"
  CAPTURE_COMPLAINT_DETAILS:
    action: call_complaint_intake_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CHECK_SERVICE_OUTAGE
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "CHECK_SERVICE_OUTAGE"
    - to: HANDLE_COMPLAINT
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "HANDLE_COMPLAINT"
    - to: REQUEST_MANUAL_APPROVAL
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "REQUEST_MANUAL_APPROVAL"
  HANDLE_COMPLAINT:
    action: call_complaint_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "SEND_CUSTOMER_CONFIRMATION"
    - to: REQUEST_MANUAL_APPROVAL
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "REQUEST_MANUAL_APPROVAL"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  CHECK_SERVICE_OUTAGE:
    action: call_outage_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: SCHEDULE_TECHNICIAN
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "SCHEDULE_TECHNICIAN"
    - to: HANDLE_COMPLAINT
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "HANDLE_COMPLAINT"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  SCHEDULE_TECHNICIAN:
    action: call_field_service_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
    - to: REQUEST_MANUAL_APPROVAL
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "REQUEST_MANUAL_APPROVAL"
  CREATE_SUPPORT_TICKET:
    action: call_ticketing_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_ESCALATED
      condition: action_result.status == "requires_manual_review" or action_result.recommended_next_state
        == "REQUEST_ESCALATED"
    - to: SEND_CUSTOMER_CONFIRMATION
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "SEND_CUSTOMER_CONFIRMATION"
  SEND_CUSTOMER_CONFIRMATION:
    action: call_notification_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: LOG_INTERACTION
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "LOG_INTERACTION"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  LOG_INTERACTION:
    action: call_audit_log_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: CLOSE_REQUEST
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "CLOSE_REQUEST"
    - to: CREATE_SUPPORT_TICKET
      condition: action_result.status != "success" or action_result.recommended_next_state
        == "CREATE_SUPPORT_TICKET"
  CLOSE_REQUEST:
    action: call_closure_agent
    action_params:
      customer_id: ''
      request_context: ''
    transitions:
    - to: REQUEST_COMPLETE
      condition: action_result.status == "success" and action_result.recommended_next_state
        == "REQUEST_COMPLETE"
    - to: REQUEST_ESCALATED
      condition: action_result.status == "requires_manual_review" or action_result.recommended_next_state
        == "REQUEST_ESCALATED"
